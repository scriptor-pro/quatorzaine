<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quatorzaine - Planner</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css?family=manrope:400,500,700|public-sans:500,700"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Ma quatorzaine</h1>
      <p class="subtitle">Tâches + rendez-vous sur la même page</p>
      <nav class="app-nav" aria-label="Navigation principale">
        <a class="app-nav-link active" href="quatorzaine.html" aria-current="page"
          ><img
            class="nav-icon nav-icon-planner"
            src="calendar-14.svg"
            alt=""
            aria-hidden="true"
            width="18"
            height="18"
          />
          Planner</a
        >
        <a class="app-nav-link" href="rendezvous.html"
          ><span class="nav-icon" aria-hidden="true">🕒</span> Rendez-vous</a
        >
        <a class="app-nav-link" href="stats.html"
          ><span class="nav-icon" aria-hidden="true">📊</span> Statistiques</a
        >
      </nav>

      <section class="planner-toolbar" aria-label="Actions cloud">
        <p
          id="cloud-status"
          class="planner-status"
          role="status"
          aria-live="polite"
        >
          Connexion cloud en cours...
        </p>
        <div class="toolbar-actions">
          <button id="cloud-pull" type="button">Télécharger cloud</button>
          <button id="cloud-push" type="button">
            Envoyer local vers cloud
          </button>
          <button id="planner-logout" type="button" class="ghost">
            Déconnexion
          </button>
        </div>
      </section>

      <section class="recurring-task-panel" aria-label="Tâches récurrentes">
        <h2>Tâches récurrentes</h2>
        <p class="recurring-task-help">
          Ajoutez une tâche qui se crée automatiquement chaque jour ou chaque
          semaine.
        </p>
        <form id="recurring-task-form" class="recurring-task-form">
          <div class="field-group recurring-task-text-group">
            <label class="field-label" for="recurring-task-text">Tâche</label>
            <input
              id="recurring-task-text"
              name="text"
              type="text"
              placeholder="Ex: Sport, lecture, suivi budget"
              required
            />
          </div>
          <div class="field-group recurring-task-frequency-group">
            <label class="field-label" for="recurring-task-frequency"
              >Rythme</label
            >
            <select id="recurring-task-frequency" name="frequency">
              <option value="daily">Tous les jours</option>
              <option value="weekly">Chaque semaine</option>
            </select>
          </div>
          <div class="field-group recurring-task-start-group">
            <label class="field-label" for="recurring-task-start"
              >Début</label
            >
            <input id="recurring-task-start" name="startDate" type="date" required />
          </div>
          <div class="field-group recurring-task-end-group">
            <label class="field-label" for="recurring-task-end">Fin (optionnel)</label>
            <input id="recurring-task-end" name="endDate" type="date" />
          </div>
          <fieldset
            id="recurring-task-weekdays"
            class="weekday-picker recurring-task-weekdays hidden"
          >
            <legend class="field-label">Jours de la semaine</legend>
            <label><input type="checkbox" name="weekday" value="1" /> Lun</label>
            <label><input type="checkbox" name="weekday" value="2" /> Mar</label>
            <label><input type="checkbox" name="weekday" value="3" /> Mer</label>
            <label><input type="checkbox" name="weekday" value="4" /> Jeu</label>
            <label><input type="checkbox" name="weekday" value="5" /> Ven</label>
            <label><input type="checkbox" name="weekday" value="6" /> Sam</label>
            <label><input type="checkbox" name="weekday" value="0" /> Dim</label>
          </fieldset>
          <button type="submit" id="recurring-task-submit">Ajouter</button>
        </form>
        <p
          id="recurring-task-status"
          class="planner-status"
          role="status"
          aria-live="polite"
        ></p>
        <ul id="recurring-task-list" class="recurring-task-list"></ul>
      </section>

      <div id="grid" aria-live="polite"></div>
    </main>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"
      integrity="sha384-0DP0MDbig+ZDZ9nB+hxK0onRr5KVsL0nGdTEFh1XVBS7HRf4AHMW2i+bOKH+8qkK"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"
      integrity="sha384-ZI73uCTk/NcBsnKPHMGJVgeSDF0ZSNPYG0cGceGuVJ8h2nLLpeDwYOGrceksNOvM"
      crossorigin="anonymous"
    ></script>
    <script defer src="script.js"></script>
  </body>
</html>
