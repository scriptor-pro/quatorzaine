<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quatorzaine - Planner</title>
    <script src="font-variants.js"></script>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css?family=dm-sans:400,500,700|inter:500,700|outfit:400,500,700|plus-jakarta-sans:500,700|rubik:500,700|sora:500,700|work-sans:400,500,700"
    />
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Aller au contenu principal</a>
    <main id="main-content" class="planner-shell">
      <h1>Ma quatorzaine</h1>
      <p class="subtitle">Tâches + rendez-vous sur la même page</p>
      <nav class="app-nav" aria-label="Navigation principale">
        <a class="app-nav-link active" href="quatorzaine.html" aria-current="page"
          ><img
            class="nav-icon nav-icon-planner"
            src="calendar-14.svg"
            alt=""
            aria-hidden="true"
            width="18"
            height="18"
          />
          Planner</a
        >
        <a class="app-nav-link" href="ajouter.html"
          ><span class="nav-icon" aria-hidden="true">➕</span> Ajouter</a
        >
        <a class="app-nav-link" href="stats.html"
          ><span class="nav-icon" aria-hidden="true">📊</span> Statistiques</a
        >
      </nav>

      <div class="bauhaus-ribbon" aria-hidden="true">
        <span class="shape shape-circle"></span>
        <span class="shape shape-rect"></span>
        <span class="shape shape-bar"></span>
      </div>

      <section class="planner-toolbar" aria-label="Actions cloud">
        <p
          id="cloud-status"
          class="planner-status"
          role="status"
          aria-live="polite"
        >
          Connexion cloud en cours...
        </p>
        <div class="toolbar-actions">
          <button id="cloud-pull" type="button">
            <img
              class="toolbar-icon"
              src="cloud-down-16x16.png"
              alt=""
              aria-hidden="true"
              width="16"
              height="16"
            />
            Télécharger cloud
          </button>
          <button id="cloud-push" type="button">
            <img
              class="toolbar-icon"
              src="cloud-up-16x16.png"
              alt=""
              aria-hidden="true"
              width="16"
              height="16"
            />
            Envoyer local vers cloud
          </button>
          <button id="planner-logout" type="button" class="ghost">
            Déconnexion
          </button>
        </div>
      </section>

      <div id="grid" aria-live="polite"></div>
    </main>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"
      integrity="sha384-0DP0MDbig+ZDZ9nB+hxK0onRr5KVsL0nGdTEFh1XVBS7HRf4AHMW2i+bOKH+8qkK"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"
      integrity="sha384-ZI73uCTk/NcBsnKPHMGJVgeSDF0ZSNPYG0cGceGuVJ8h2nLLpeDwYOGrceksNOvM"
      crossorigin="anonymous"
    ></script>
    <script defer src="script.js"></script>
  </body>
</html>
