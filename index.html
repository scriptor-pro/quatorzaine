<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quatorzaine - Connexion</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css?family=manrope:400,500,700|public-sans:500,700"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <header class="auth-header">
        <h1>Bienvenue sur Ma quatorzaine</h1>
        <p>Connectez-vous ou créez un compte pour accéder au planner.</p>
      </header>

      <section class="server-panel" aria-label="Configuration PocketBase">
        <h2>Serveur PocketBase</h2>
        <form id="server-form" class="server-form">
          <label for="pb-url">URL du serveur</label>
          <input
            id="pb-url"
            name="url"
            type="url"
            placeholder="https://votre-pocketbase.example.com"
            autocomplete="url"
            required
          />
          <button type="submit">Enregistrer</button>
        </form>
        <p
          id="server-status"
          class="status-text"
          role="status"
          aria-live="polite"
        ></p>
      </section>

      <section class="auth-panels" aria-label="Authentification">
        <article class="auth-card login-card">
          <h2>Connexion</h2>
          <p class="card-subtitle">
            Accès immédiat à votre quatorzaine existante
          </p>
          <form id="login-form" class="auth-form">
            <label for="login-email">Email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              placeholder="email"
              autocomplete="email"
              required
            />
            <label for="login-password">Mot de passe</label>
            <input
              id="login-password"
              name="password"
              type="password"
              placeholder="mot de passe"
              autocomplete="current-password"
              required
            />
            <button type="submit">Se connecter</button>
          </form>
          <p
            id="login-status"
            class="status-text"
            role="status"
            aria-live="polite"
          ></p>
        </article>

        <article class="auth-card signup-card">
          <h2>Créer un compte</h2>
          <p class="card-subtitle">
            Première fois ici ? Ouvrez votre espace personnel
          </p>
          <form id="signup-form" class="auth-form">
            <label for="signup-email">Email</label>
            <input
              id="signup-email"
              name="email"
              type="email"
              placeholder="email"
              autocomplete="email"
              required
            />
            <label for="signup-password">Mot de passe</label>
            <input
              id="signup-password"
              name="password"
              type="password"
              placeholder="mot de passe"
              autocomplete="new-password"
              required
            />
            <label for="signup-password-confirm">Confirmation</label>
            <input
              id="signup-password-confirm"
              name="passwordConfirm"
              type="password"
              placeholder="confirmer le mot de passe"
              autocomplete="new-password"
              required
            />
            <button type="submit">Créer puis ouvrir le planner</button>
          </form>
          <p
            id="signup-status"
            class="status-text"
            role="status"
            aria-live="polite"
          ></p>
        </article>
      </section>
    </main>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"
      integrity="sha384-ZI73uCTk/NcBsnKPHMGJVgeSDF0ZSNPYG0cGceGuVJ8h2nLLpeDwYOGrceksNOvM"
      crossorigin="anonymous"
    ></script>
    <script defer src="auth.js"></script>
  </body>
</html>
