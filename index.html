<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quatorzaine - Taches et rendez-vous</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Ma quatorzaine</h1>
    <p class="subtitle">
      Taches deplacables + rendez-vous fixes sur la meme page
    </p>

    <section class="cloud-panel" aria-label="Synchronisation PocketBase">
      <h2 class="cloud-title">Synchronisation PocketBase</h2>
      <form id="cloud-auth-form" class="cloud-auth-form">
        <input
          id="pb-url"
          name="url"
          type="url"
          placeholder="https://votre-pocketbase.example.com"
          required
        />
        <input
          id="pb-email"
          name="email"
          type="email"
          placeholder="email"
          required
        />
        <input
          id="pb-password"
          name="password"
          type="password"
          placeholder="mot de passe"
          required
        />
        <button type="submit">Connexion</button>
      </form>
      <div class="cloud-actions">
        <button id="cloud-pull" type="button">Telecharger cloud</button>
        <button id="cloud-push" type="button">Envoyer local vers cloud</button>
        <button id="cloud-logout" type="button" class="ghost">
          Deconnexion
        </button>
      </div>
      <p id="cloud-status" class="cloud-status">Mode local uniquement.</p>
      <p class="cloud-help">
        Collection attendue: <code>planner_snapshots</code> avec champs
        <code>owner</code> (relation vers users) et <code>schedule</code> (json
        ou text).
      </p>
    </section>

    <div id="grid" aria-live="polite"></div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"
    ></script>
    <script defer src="script.js"></script>
  </body>
</html>
