<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposition 1 - Menu rapide</title>
    <style>
      :root { --line: #d9ceb7; --text: #2f2a23; --muted: #5f564b; --accent: #1f49b6; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "DM Sans", "Inter", sans-serif; background: #f8f5ef; color: var(--text); padding: 24px; }
      .shell { max-width: 380px; margin: 0 auto; }
      .card { border: 1px solid var(--line); border-radius: 12px; background: #fffdf8; padding: 12px; }
      h1 { margin: 0 0 10px; font-size: 1rem; }
      .task { border: 1px solid #d2ddef; border-radius: 8px; padding: 8px; background: #eef5ff; margin-bottom: 8px; }
      .add-wrap { position: relative; }
      button { min-height: 40px; border: 1px solid #1f49b6; background: #1f49b6; color: #fff; border-radius: 8px; padding: 0 12px; font-weight: 700; cursor: pointer; }
      .menu { position: absolute; top: 46px; left: 0; right: 0; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 6px; display: none; }
      .menu.open { display: grid; gap: 6px; }
      .menu button { background: #f5f8ff; color: #183f9b; border-color: #b7c9ef; text-align: left; }
      form { display: none; margin-top: 8px; gap: 8px; }
      form.open { display: grid; }
      input { min-height: 40px; border: 1px solid #cfc4ae; border-radius: 8px; padding: 8px; font: inherit; }
      .ghost { background: #f5f2ea; color: #3d352d; border-color: #c9bca1; }
      .hint { margin-top: 8px; color: var(--muted); font-size: 0.86rem; }
      a { display: inline-block; margin-top: 12px; color: #1b3f9b; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1>Proposition 1 - Bouton + menu rapide</h1>
        <div class="task">☐ Exemple de tâche existante</div>

        <div class="add-wrap">
          <button id="add-btn" type="button">Ajouter</button>
          <div id="menu" class="menu" role="menu">
            <button id="choose-task" type="button">Ajouter une tâche</button>
            <button id="choose-appointment" type="button">Ajouter un rendez-vous</button>
          </div>
        </div>

        <form id="task-form">
          <input type="text" placeholder="Nouvelle tâche" />
          <button type="button">Ajouter la tâche</button>
          <button class="ghost" id="cancel-task" type="button">Annuler</button>
        </form>

        <form id="appointment-form">
          <input type="text" placeholder="Rendez-vous" />
          <input type="time" />
          <input type="number" value="60" min="5" step="5" />
          <button type="button">Ajouter le rendez-vous</button>
          <button class="ghost" id="cancel-appointment" type="button">Annuler</button>
        </form>

        <p class="hint">Par défaut, seul le bouton Ajouter est visible.</p>
      </div>
      <a href="test-ux-ajout-index.html">Retour à l'index</a>
    </div>

    <script>
      const addBtn = document.getElementById("add-btn");
      const menu = document.getElementById("menu");
      const taskForm = document.getElementById("task-form");
      const appointmentForm = document.getElementById("appointment-form");

      function closeAll() {
        menu.classList.remove("open");
        taskForm.classList.remove("open");
        appointmentForm.classList.remove("open");
      }

      addBtn.addEventListener("click", () => {
        const isOpen = menu.classList.contains("open");
        closeAll();
        if (!isOpen) {
          menu.classList.add("open");
        }
      });

      document.getElementById("choose-task").addEventListener("click", () => {
        closeAll();
        taskForm.classList.add("open");
      });

      document.getElementById("choose-appointment").addEventListener("click", () => {
        closeAll();
        appointmentForm.classList.add("open");
      });

      document.getElementById("cancel-task").addEventListener("click", closeAll);
      document.getElementById("cancel-appointment").addEventListener("click", closeAll);
    </script>
  </body>
</html>
