<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposition 2 - Panneau de choix</title>
    <style>
      :root { --line: #d9ceb7; --text: #2f2a23; --muted: #5f564b; --accent: #1f49b6; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "DM Sans", "Inter", sans-serif; background: #f8f5ef; color: var(--text); padding: 24px; }
      .shell { max-width: 380px; margin: 0 auto; }
      .card { border: 1px solid var(--line); border-radius: 12px; background: #fffdf8; padding: 12px; }
      h1 { margin: 0 0 10px; font-size: 1rem; }
      .task { border: 1px solid #d2ddef; border-radius: 8px; padding: 8px; background: #eef5ff; margin-bottom: 8px; }
      button { min-height: 40px; border: 1px solid #1f49b6; background: #1f49b6; color: #fff; border-radius: 8px; padding: 0 12px; font-weight: 700; cursor: pointer; }
      .sheet { margin-top: 8px; border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 10px; display: none; }
      .sheet.open { display: grid; gap: 8px; }
      .choice { border: 1px solid #ced9ef; border-radius: 8px; background: #f6f9ff; color: #183f9b; padding: 10px; text-align: left; }
      .choice small { display: block; color: #516489; margin-top: 4px; font-weight: 500; }
      .form { display: none; margin-top: 8px; gap: 8px; }
      .form.open { display: grid; }
      input { min-height: 40px; border: 1px solid #cfc4ae; border-radius: 8px; padding: 8px; font: inherit; }
      .ghost { background: #f5f2ea; color: #3d352d; border-color: #c9bca1; }
      .hint { margin-top: 8px; color: var(--muted); font-size: 0.86rem; }
      a { display: inline-block; margin-top: 12px; color: #1b3f9b; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1>Proposition 2 - Bouton + panneau de choix</h1>
        <div class="task">☐ Exemple de tâche existante</div>

        <button id="add-btn" type="button">Ajouter</button>

        <section id="sheet" class="sheet" aria-label="Choisir ce que vous ajoutez">
          <button class="choice" id="choice-task" type="button">Tâche<small>Idéal pour une action rapide.</small></button>
          <button class="choice" id="choice-appointment" type="button">Rendez-vous<small>Ajoute heure + durée.</small></button>
          <button class="ghost" id="close-sheet" type="button">Fermer</button>
        </section>

        <form id="task-form" class="form">
          <input type="text" placeholder="Nouvelle tâche" />
          <button type="button">Ajouter la tâche</button>
        </form>

        <form id="appointment-form" class="form">
          <input type="text" placeholder="Rendez-vous" />
          <input type="time" />
          <input type="number" value="60" min="5" step="5" />
          <button type="button">Ajouter le rendez-vous</button>
        </form>

        <p class="hint">Par défaut, seul Ajouter apparaît. Le panneau s'ouvre ensuite.</p>
      </div>
      <a href="test-ux-ajout-index.html">Retour à l'index</a>
    </div>

    <script>
      const addBtn = document.getElementById("add-btn");
      const sheet = document.getElementById("sheet");
      const taskForm = document.getElementById("task-form");
      const appointmentForm = document.getElementById("appointment-form");

      function resetForms() {
        taskForm.classList.remove("open");
        appointmentForm.classList.remove("open");
      }

      addBtn.addEventListener("click", () => {
        sheet.classList.toggle("open");
        resetForms();
      });

      document.getElementById("choice-task").addEventListener("click", () => {
        sheet.classList.remove("open");
        resetForms();
        taskForm.classList.add("open");
      });

      document.getElementById("choice-appointment").addEventListener("click", () => {
        sheet.classList.remove("open");
        resetForms();
        appointmentForm.classList.add("open");
      });

      document.getElementById("close-sheet").addEventListener("click", () => {
        sheet.classList.remove("open");
        resetForms();
      });
    </script>
  </body>
</html>
