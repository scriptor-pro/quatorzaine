<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quatorzaine - Statistiques</title>
    <script src="font-variants.js"></script>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css?family=dm-sans:400,500,700|inter:500,700|outfit:400,500,700|plus-jakarta-sans:500,700|rubik:500,700|sora:500,700|work-sans:400,500,700"
    />
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="stats.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Aller au contenu principal</a>
    <main id="main-content" class="stats-shell">
      <h1>Statistiques <span class="app-version">v0.9.14</span></h1>
      <p class="subtitle">Top 10 des journées avec le plus de tâches terminées</p>
      <nav class="app-nav" aria-label="Navigation principale">
        <a class="app-nav-link" href="quatorzaine.html"
          ><i class="nav-icon" data-lucide="layout-grid" aria-hidden="true"></i>
          Planner</a
        >
        <a class="app-nav-link" href="ajouter.html"
          ><i class="nav-icon" data-lucide="plus" aria-hidden="true"></i> Ajouter</a
        >
        <a class="app-nav-link active" href="stats.html" aria-current="page"
          ><i class="nav-icon" data-lucide="bar-chart-3" aria-hidden="true"></i> Statistiques</a
        >
      </nav>

      <div class="bauhaus-ribbon" aria-hidden="true">
        <span class="shape shape-circle"></span>
        <span class="shape shape-rect"></span>
        <span class="shape shape-bar"></span>
      </div>

      <section class="stats-panel" aria-label="Classement des jours">
        <h2>Classement</h2>
        <article class="streak-card" aria-label="Plus longue série de jours actifs">
          <h3>Séries de jours actifs</h3>
          <div class="streak-grid">
            <section class="streak-metric" aria-label="Plus longue série">
              <h4>Plus longue série</h4>
              <p id="streak-value" class="streak-value"></p>
              <p id="streak-range" class="streak-range"></p>
            </section>
            <section class="streak-metric" aria-label="Série en cours">
              <h4>Série en cours</h4>
              <p id="current-streak-value" class="streak-value"></p>
              <p id="current-streak-range" class="streak-range"></p>
            </section>
          </div>
        </article>
        <article class="streak-card" aria-label="Compteur d'actions">
          <h3>Actions suivies</h3>
          <div class="streak-grid">
            <section class="streak-metric" aria-label="Actions aujourd'hui">
              <h4>Aujourd'hui</h4>
              <p id="actions-today-value" class="streak-value"></p>
              <p id="actions-today-range" class="streak-range"></p>
            </section>
            <section class="streak-metric" aria-label="Actions cumulées">
              <h4>Total cumulé</h4>
              <p id="actions-total-value" class="streak-value"></p>
              <p id="actions-total-range" class="streak-range"></p>
            </section>
          </div>
        </article>
        <p id="stats-summary" class="planner-status" role="status" aria-live="polite"></p>
        <ol id="stats-list" class="stats-list"></ol>
      </section>
    </main>

    <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script defer src="lucide-init.js"></script>
    <script defer src="stats.js"></script>
  </body>
</html>
