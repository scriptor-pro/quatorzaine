<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposition 5 - Tâche par défaut</title>
    <style>
      :root { --line: #d9ceb7; --text: #2f2a23; --muted: #5f564b; --accent: #1f49b6; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "DM Sans", "Inter", sans-serif; background: #f8f5ef; color: var(--text); padding: 24px; }
      .shell { max-width: 380px; margin: 0 auto; }
      .card { border: 1px solid var(--line); border-radius: 12px; background: #fffdf8; padding: 12px; }
      h1 { margin: 0 0 10px; font-size: 1rem; }
      .task { border: 1px solid #d2ddef; border-radius: 8px; padding: 8px; background: #eef5ff; margin-bottom: 8px; }
      button { min-height: 40px; border: 1px solid #1f49b6; background: #1f49b6; color: #fff; border-radius: 8px; padding: 0 12px; font-weight: 700; cursor: pointer; }
      input { min-height: 40px; border: 1px solid #cfc4ae; border-radius: 8px; padding: 8px; font: inherit; }
      .task-form, .appointment-form { display: none; margin-top: 8px; gap: 8px; }
      .task-form.open, .appointment-form.open { display: grid; }
      .switch {
        display: none;
        margin-top: 6px;
        font-size: 0.86rem;
        color: #1b3f9b;
        text-decoration: underline;
        cursor: pointer;
      }
      .switch.show { display: inline-block; }
      .ghost { background: #f5f2ea; color: #3d352d; border-color: #c9bca1; }
      .hint { margin-top: 8px; color: var(--muted); font-size: 0.86rem; }
      a { display: inline-block; margin-top: 12px; color: #1b3f9b; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1>Proposition 5 - Tâche par défaut + switch discret</h1>
        <div class="task">☐ Exemple de tâche existante</div>

        <button id="add-btn" type="button">Ajouter</button>
        <button id="switch-to-appointment" class="switch" type="button">+ Ajouter plutôt un rendez-vous</button>
        <button id="switch-to-task" class="switch" type="button">+ Revenir en mode tâche</button>

        <form id="task-form" class="task-form">
          <input type="text" placeholder="Nouvelle tâche" />
          <button type="button">Ajouter la tâche</button>
          <button id="close-task" class="ghost" type="button">Fermer</button>
        </form>

        <form id="appointment-form" class="appointment-form">
          <input type="text" placeholder="Rendez-vous" />
          <input type="time" />
          <input type="number" value="60" min="5" step="5" />
          <button type="button">Ajouter le rendez-vous</button>
          <button id="close-appointment" class="ghost" type="button">Fermer</button>
        </form>

        <p class="hint">Par défaut: clic Ajouter ouvre directement le mode tâche.</p>
      </div>
      <a href="test-ux-ajout-index.html">Retour à l'index</a>
    </div>

    <script>
      const addBtn = document.getElementById("add-btn");
      const taskForm = document.getElementById("task-form");
      const appointmentForm = document.getElementById("appointment-form");
      const switchToAppointment = document.getElementById("switch-to-appointment");
      const switchToTask = document.getElementById("switch-to-task");

      function closeAll() {
        taskForm.classList.remove("open");
        appointmentForm.classList.remove("open");
        switchToAppointment.classList.remove("show");
        switchToTask.classList.remove("show");
      }

      addBtn.addEventListener("click", () => {
        closeAll();
        taskForm.classList.add("open");
        switchToAppointment.classList.add("show");
      });

      switchToAppointment.addEventListener("click", () => {
        taskForm.classList.remove("open");
        appointmentForm.classList.add("open");
        switchToAppointment.classList.remove("show");
        switchToTask.classList.add("show");
      });

      switchToTask.addEventListener("click", () => {
        appointmentForm.classList.remove("open");
        taskForm.classList.add("open");
        switchToTask.classList.remove("show");
        switchToAppointment.classList.add("show");
      });

      document.getElementById("close-task").addEventListener("click", closeAll);
      document.getElementById("close-appointment").addEventListener("click", closeAll);
    </script>
  </body>
</html>
